<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Logo mark (scaled from 100x100 viewBox) -->
  <g transform="translate(160, 155) scale(3.2)">
    <circle
      cx="50" cy="50" r="42"
      fill="none"
      stroke="#FF661C"
      stroke-width="7"
      stroke-linecap="round"
      stroke-dasharray="240.1 23.75"
      transform="rotate(-90 50 50)"
    />
    <path
      d="M 28 50 L 44 66 L 67 43"
      fill="none"
      stroke="#FF661C"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="28" cy="50" r="5" fill="#FF661C"/>
    <circle cx="44" cy="66" r="5" fill="#FF661C"/>
    <circle cx="74" cy="36" r="5" fill="#FF661C"/>
  </g>

  <!-- Title -->
  <text x="560" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#FF661C">Verifiable Intent</text>

  <!-- Tagline line 1 -->
  <text x="560" y="340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#B0B0B0">Open specification for cryptographic</text>

  <!-- Tagline line 2 -->
  <text x="560" y="382" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#B0B0B0">agent authorization in commerce</text>

  <!-- Subtle bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#FF661C" opacity="0.6"/>
</svg>
